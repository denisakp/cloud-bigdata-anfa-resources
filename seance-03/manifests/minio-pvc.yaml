# minio-pvc.yaml
# ─────────────────────────────────────────────────────────────
# Demande de stockage persistant pour MinIO.
# Équivalent du volume nommé "anfa-minio-data" en Docker Compose.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc # <-- Indenté de 2 espaces ici
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi