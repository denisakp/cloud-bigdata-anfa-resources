services:
  minio:
    image: minio/minio
    container_name: anfa-minio-seance2
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: anfa-admin
      MINIO_ROOT_PASSWORD: anfa-password-2026
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  create-buckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 anfa-admin anfa-password-2026;
      /usr/bin/mc mb myminio/anfa-raw;
      /usr/bin/mc cp /data/referentiel/bus.csv myminio/anfa-raw/referentiel/bus.csv;
      "
    volumes:
      - ../data:/data

  analyse:
    build: .
    container_name: anfa-analyse-container
    depends_on:
      create-buckets:
        condition: service_completed_successfully
    environment:
      - ENDPOINT_URL=http://minio:9000

volumes:
  minio-data:
  