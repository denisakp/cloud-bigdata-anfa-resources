services:
  minio:
    image: minio/minio
    container_name: anfa-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - anfa-minio-data:/data
    environment:
      MINIO_ROOT_USER: anfa-admin
      MINIO_ROOT_PASSWORD: anfa-password-2026
    command: server /data --console-address ":9001"

volumes:
  anfa-minio-data:

